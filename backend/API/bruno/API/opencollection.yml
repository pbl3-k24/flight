opencollection: 1.0.0

info:
  name: API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: baseUrl
      value: http://localhost:5042
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: http://localhost:5042
