  type: http
  seq: 1
  tags:
    - Bookings

http:
  method: POST
  url: "{{baseUrl}}/api/v1/Bookings"
  body:
    type: json
    data: |-
      {
        "outboundFlightId": 0,
        "returnFlightId": 0,
        "passengerCount": 0,
        "seatClassId": 0,
        "passengers": [
          {
            "firstName": "",
            "lastName": "",
            "email": "",
            "phone": "",
            "dateOfBirth": "",
            "nationality": "",
            "passportNumber": ""
          }
        ],
        "promotionId": 0
      }
  auth: inherit

runtime:
