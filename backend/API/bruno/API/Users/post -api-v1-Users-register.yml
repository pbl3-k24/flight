info:
  name: post /api/v1/Users/register
  type: http
  seq: 1
  tags:
    - Users

http:
  method: POST
  url: "{{baseUrl}}/api/v1/Users/register"
  body:
    type: json
    data: |-
      {
        "email": "",
        "password": "",
        "fullName": "",
        "phone": ""
      }
  auth: inherit

runtime:
